body:
  text: 志怪録祖台之吳未亡前常有紫赤氣見斗牛之間星官及諸善占者咸憂吳方興惟張茂先於天文尤精獨知為神劍之氣非江南之祥晉懷帝永嘉中譙國丁杜渡江至陰陵界時天昏霧在道北見一物如人倒立兩眼垂血從頭下聚地兩處各有升餘杜與從弟齊聲喝之滅而不見立處聚血皆化為螢火數千枚縱棋飛去荀晞為兗州鎮去京師五百里有貢晞珍異食者欲貽都邑親貴盧經信宿之間不復鮮美募有牛能日行數百里者當厚賞之有人進一牛云此一日行千里晞乃命其丁車善馭書疏發遣旦發日中到京師取答書還至二更始竟便達晞以其駿快筋骨必將有異遂殺而觀之亦無靈唯奴筋如小竹大自頭挾脊著肉褁故非不覺也吳中有一士大夫於都假還西曲阿堂上見一女子甚美留其宿士解臂金鈴繫女臂令暮更來遂不至使人求都無此色過豬圈見一母豬臂上繫金鈴會稽山陰東郭氏女先與縣人私通此人占還於縣東靈慈橋女往入船就之因共寢接為設食鰌蝥食畢女將兩鰌蝥上岸去船還來至郭逢人語此女已死乃往省之尚未殯也發衾視之兩手各把一鰌蝥吳中書郎盛沖至孝母王氏失明沖暫行勑婢食母婢乃蠐螬齏食之王氏甚美然非魚肉母謂沖曰汝試問之既而問婢服實見蠐螬沖抱母慟哭而目立開本草經曰蠐螬一名蟦齊主治血瘴建康小吏曹著見廬山夫人夫人為設酒出金鳥啄罌其中鏤刻奇肴異形非人所能名下七子合盤盤中亦無俗中肴孫弘常自云見鬼神與其言語委曲衆未之信鎮西將軍謝尚常所乘馬忽暴死會弘詣尚常愛惜至甚謂尚曰我為君活馬何如尚常不信弘答曰卿若能令此馬更生則卿真實通神矣弘於是便下床去良久還語尚曰廟神愛樂馬故耳向我詣神請之初殊不許後乃見聽馬即目便活尚對死馬坐意甚不信怪其所言須臾其馬忽從門外走還衆咸見之莫不驚惋既至馬尸應時能動有頃奮逸鳴呼尚方歎服會稽郡常有大鬼長數丈腰大數十圍高冠玄衣郡將吉凶跂于雷門示憂喜之色謝氏一族憂喜必告弘道未遭母難數月鬼晨夕未臨及後轉吏部尚書拊掌三節舞自大門至中庭尋而遷問至
